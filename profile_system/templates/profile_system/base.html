<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Profile System — SMS Spam{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0e0f14;
            --surface: #16181f;
            --surface2: #1e2029;
            --border: #2a2d3a;
            --accent: #6c63ff;
            --accent2: #ff6584;
            --text: #e8eaf0;
            --text-muted: #7c7f96;
            --success: #43e97b;
            --danger: #ff4d6d;
            --warning: #ffd166;
            --radius: 14px;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image: radial-gradient(ellipse at 20% 0%, rgba(108,99,255,0.08) 0%, transparent 60%),
                              radial-gradient(ellipse at 80% 100%, rgba(255,101,132,0.06) 0%, transparent 60%);
        }

        /* Navbar */
        nav {
            background: rgba(22,24,31,0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }
        .nav-brand {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-brand .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: inline-block; }
        .nav-links { display: flex; align-items: center; gap: 6px; }
        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .nav-links a:hover { color: var(--text); background: var(--surface2); }
        .nav-links .btn-nav {
            background: var(--accent);
            color: #fff;
            padding: 7px 16px;
            border-radius: 8px;
            font-weight: 600;
        }
        .nav-links .btn-nav:hover { background: #5a52e0; color: #fff; }

        /* Main layout */
        main { max-width: 960px; margin: 0 auto; padding: 2.5rem 1.5rem; }

        /* Messages */
        .messages { margin-bottom: 1.5rem; }
        .alert {
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 0.9rem;
            margin-bottom: 10px;
            border: 1px solid transparent;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        .alert-success { background: rgba(67,233,123,0.08); border-color: rgba(67,233,123,0.25); color: var(--success); }
        .alert-error, .alert-danger { background: rgba(255,77,109,0.08); border-color: rgba(255,77,109,0.25); color: var(--danger); }
        .alert-info { background: rgba(108,99,255,0.08); border-color: rgba(108,99,255,0.25); color: var(--accent); }
        .alert-warning { background: rgba(255,209,102,0.08); border-color: rgba(255,209,102,0.25); color: var(--warning); }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            box-shadow: var(--shadow);
        }

        /* Forms */
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
        .form-control {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 9px;
            padding: 10px 14px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,0.15); }
        .form-control::placeholder { color: var(--text-muted); }
        .form-control-file { color: var(--text-muted); font-size: 0.9rem; }
        .errorlist { list-style: none; color: var(--danger); font-size: 0.82rem; margin-top: 4px; }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: #5a52e0; transform: translateY(-1px); }
        .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--border); }
        .btn-danger { background: rgba(255,77,109,0.12); color: var(--danger); border: 1px solid rgba(255,77,109,0.25); }
        .btn-danger:hover { background: rgba(255,77,109,0.2); }
        .btn-sm { padding: 7px 14px; font-size: 0.82rem; }

        /* Headings */
        h1, h2, h3 { font-family: 'Syne', sans-serif; font-weight: 700; }
        h1 { font-size: 1.8rem; }
        h2 { font-size: 1.4rem; }

        /* Divider */
        hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

        /* Utility */
        .text-muted { color: var(--text-muted); font-size: 0.88rem; }
        .text-center { text-align: center; }
        .mt-1 { margin-top: 0.5rem; } .mt-2 { margin-top: 1rem; } .mt-3 { margin-top: 1.5rem; }
        .mb-1 { margin-bottom: 0.5rem; } .mb-2 { margin-bottom: 1rem; }
        .d-flex { display: flex; } .align-center { align-items: center; } .gap-2 { gap: 1rem; }
        .flex-wrap { flex-wrap: wrap; }

        select.form-control option { background: var(--surface2); }
        textarea.form-control { resize: vertical; min-height: 90px; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav>
        <a href="{% url 'profile_system:profile_detail' %}" class="nav-brand">
            <span class="dot"></span> SMS Spam
        </a>
        <div class="nav-links">
            {% if user.is_authenticated %}
                <a href="{% url 'profile_system:profile_detail' %}">My Profile</a>
                <a href="{% url 'profile_system:profile_edit' %}">Edit</a>
                <a href="{% url 'profile_system:logout' %}" class="btn-nav">Logout</a>
            {% else %}
                <a href="{% url 'profile_system:login' %}">Login</a>
                <a href="{% url 'profile_system:register' %}" class="btn-nav">Register</a>
            {% endif %}
        </div>
    </nav>

    <main>
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
